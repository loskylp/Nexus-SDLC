name: Build and publish docs image

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'RATIONALE.md'
      - 'REFERENCES.md'
      - 'process/**'
      - '.github/mkdocs.yml'
      - '.github/docs-assets/**'
      - '.github/Dockerfile'
      - '.github/nginx.conf'
      - '.github/workflows/docs.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nexus-sdlc-docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs_src
        run: |
          mkdir -p docs_src/process
          cp README.md    docs_src/index.md
          cp RATIONALE.md docs_src/rationale.md
          cp REFERENCES.md docs_src/references.md
          cp process/*.md  docs_src/process/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
