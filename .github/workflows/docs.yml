name: Build and publish docs image

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'RATIONALE.md'
      - 'REFERENCES.md'
      - 'process/**'
      - 'tests/**'
      - '.github/site/**'
      - '.github/Dockerfile'
      - '.github/nginx.conf'
      - '.github/workflows/docs.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nexus-sdlc-docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs_src
        run: |
          mkdir -p docs_src/process docs_src/tests/explorations

          # Root pages
          cp README.md     docs_src/index.md
          cp RATIONALE.md  docs_src/rationale.md
          cp REFERENCES.md docs_src/references.md

          # Process decisions and open questions
          cp process/*.md  docs_src/process/

          # Test projects
          cp tests/*.md    docs_src/tests/
          if compgen -G "tests/explorations/*.md" > /dev/null; then
            cp tests/explorations/*.md docs_src/tests/explorations/
          fi

          # Strip HTML license comment blocks from all markdown files
          # (the <!-- Copyright ... --> header that precedes page content)
          python3 - <<'PYEOF'
          import re, pathlib
          comment_block = re.compile(r'^\s*<!--.*?-->\s*\n?', re.DOTALL)
          for p in pathlib.Path('docs_src').rglob('*.md'):
              text = p.read_text()
              cleaned = comment_block.sub('', text, count=1)
              if cleaned != text:
                  p.write_text(cleaned)
          PYEOF

          # Add Starlight frontmatter to files that lack it
          python3 - <<'PYEOF'
          import re, pathlib
          for p in pathlib.Path('docs_src').rglob('*.md'):
              text = p.read_text()
              if text.startswith('---'):
                  continue          # already has frontmatter
              # Derive title from first h1, fallback to filename
              m = re.search(r'^#\s+(.+)$', text, re.MULTILINE)
              title = m.group(1).strip() if m else p.stem.replace('-', ' ').title()
              # Escape quotes in title
              title = title.replace('"', '\\"')
              p.write_text(f'---\ntitle: "{title}"\n---\n\n' + text)
          PYEOF

          # Remove dead agent links from the overview page
          python3 -c "
          import re, pathlib
          p = pathlib.Path('docs_src/index.md')
          p.write_text(re.sub(r'\[([^\]]+)\]\(agents/[^\)]+\)', r'\1', p.read_text()))
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
