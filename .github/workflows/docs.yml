name: Build and publish docs image

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'RATIONALE.md'
      - 'REFERENCES.md'
      - 'process/**'
      - 'tests/**'
      - '.github/site/**'
      - '.github/Dockerfile'
      - '.github/nginx.conf'
      - '.github/workflows/docs.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nexus-sdlc-docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs content
        run: |
          DOCS=.github/site/src/content/docs
          mkdir -p "$DOCS/process" "$DOCS/tests/explorations"

          # Root pages
          cp README.md     "$DOCS/overview.md"
          cp RATIONALE.md  "$DOCS/rationale.md"
          cp REFERENCES.md "$DOCS/references.md"

          # Process decisions and open questions
          cp process/*.md  "$DOCS/process/"

          # Test projects
          cp tests/*.md    "$DOCS/tests/"
          if compgen -G "tests/explorations/*.md" > /dev/null; then
            cp tests/explorations/*.md "$DOCS/tests/explorations/"
          fi

          # Strip HTML license comment blocks (<!-- Copyright ... --> header)
          python3 - <<'PYEOF'
          import re, pathlib
          comment_block = re.compile(r'^\s*<!--.*?-->\s*\n?', re.DOTALL)
          docs = pathlib.Path('.github/site/src/content/docs')
          for p in docs.rglob('*.md'):
              text = p.read_text()
              cleaned = comment_block.sub('', text, count=1)
              if cleaned != text:
                  p.write_text(cleaned)
          PYEOF

          # Add Starlight frontmatter to files that lack it
          python3 - <<'PYEOF'
          import re, pathlib
          docs = pathlib.Path('.github/site/src/content/docs')
          for p in docs.rglob('*.md'):
              text = p.read_text()
              if text.startswith('---'):
                  continue
              m = re.search(r'^#\s+(.+)$', text, re.MULTILINE)
              title = m.group(1).strip() if m else p.stem.replace('-', ' ').title()
              title = title.replace('"', '\\"')
              p.write_text(f'---\ntitle: "{title}"\n---\n\n' + text)
          PYEOF

          # Remove dead agent links from the overview page
          python3 -c "
          import re, pathlib
          p = pathlib.Path('.github/site/src/content/docs/overview.md')
          p.write_text(re.sub(r'\[([^\]]+)\]\(agents/[^\)]+\)', r'\1', p.read_text()))
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
